<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <g class="mascot-body">
    <rect x="30" y="20" width="40" height="10" fill="oklch(0.7 0.18 0)" />
    <rect x="20" y="30" width="60" height="50" fill="oklch(0.7 0.18 0)" />
    <rect x="30" y="80" width="40" height="10" fill="oklch(0.7 0.18 0)" />
    <rect x="30" y="30" width="10" height="10" fill="var(--bg)" opacity="0.35" />
    <g class="mascot-eyes">
      <rect x="35" y="45" width="10" height="10" fill="var(--bg)" />
      <rect x="55" y="45" width="10" height="10" fill="var(--bg)" />
      <rect x="38" y="48" width="4" height="4" fill="var(--fg)" />
      <rect x="58" y="48" width="4" height="4" fill="var(--fg)" />
    </g>
  </g>
  <g class="mascot-accent">
    <rect x="68" y="64" width="4" height="20" fill="var(--fg)" transform="rotate(45 70 74)" />
    <rect x="78" y="78" width="6" height="2" fill="var(--fg)" />
  </g>
</svg>
